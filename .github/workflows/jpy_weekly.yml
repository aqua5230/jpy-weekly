name: jpy-weekly

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Taipei
      JPY_USE_DIST: '1'
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      TG_PUBLIC: ${{ secrets.TG_PUBLIC }}
      TG_VIP: ${{ secrets.TG_VIP }}
      TG_TEST: ${{ secrets.TG_TEST }}
      TG_DEV: ${{ secrets.TG_DEV }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Get pip cache dir
        id: pip-cache
        run: echo "dir=$(python -m pip cache dir)" >> "$GITHUB_OUTPUT"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Set run date
        id: run-date
        run: echo "value=$(TZ=Asia/Taipei date +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate weekly report
        run: python jpy_weekly_report.py

      - name: Publish GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages

      - name: Commit back data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: weekly run ${{ steps.run-date.outputs.value }} [skip ci]"
          file_pattern: backtest_predictions.json .cot_history.json .boj_qe_cache.json .calendar_cache.json
